<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arenaGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#359381"></stop>
      <stop offset="100%" stop-color="#4dc7ad"></stop>
    </linearGradient>
  </defs>

  <!-- Arena Ring -->
  <circle cx="256" cy="256" r="220" stroke="url(#arenaGradient)" stroke-width="20" fill="none"></circle>

  <!-- Grid -->
  <g stroke="url(#arenaGradient)" stroke-width="16" stroke-linecap="round">
    <line x1="180" y1="140" x2="180" y2="372"></line>
    <line x1="332" y1="140" x2="332" y2="372"></line>

    <line x1="140" y1="180" x2="372" y2="180"></line>
    <line x1="140" y1="332" x2="372" y2="332"></line>
  </g>

  <!-- Top Left X -->
  <g stroke="white" stroke-width="18" stroke-linecap="round">
    <line x1="155" y1="155" x2="205" y2="205"></line>
    <line x1="205" y1="155" x2="155" y2="205"></line>
  </g>

  <!-- Top Right X -->
  <g stroke="white" stroke-width="18" stroke-linecap="round">
    <line x1="307" y1="155" x2="357" y2="205"></line>
    <line x1="357" y1="155" x2="307" y2="205"></line>
  </g>

  <!-- Bottom Left X -->
  <g stroke="white" stroke-width="18" stroke-linecap="round">
    <line x1="155" y1="307" x2="205" y2="357"></line>
    <line x1="205" y1="307" x2="155" y2="357"></line>
  </g>

  <!-- Bottom Right X -->
  <g stroke="white" stroke-width="18" stroke-linecap="round">
    <line x1="307" y1="307" x2="357" y2="357"></line>
    <line x1="357" y1="307" x2="307" y2="357"></line>
  </g>

  <!-- Center O -->
  <circle cx="256" cy="256" r="34" stroke="url(#arenaGradient)" stroke-width="18" fill="none"></circle>

  <!-- Center Glow -->
  <circle cx="256" cy="256" r="8" fill="#4dc7ad"></circle>
</svg>